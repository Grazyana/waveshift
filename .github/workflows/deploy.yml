name: Deploy WaveShift
run-name: Full Deploy

on:
  push:
    branches: [ main ]

env:
  PROJECT_NAME: waveshift
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Delete existing CloudWatch Log Groups
        run: |
          aws logs delete-log-group --log-group-name /aws/lambda/waveshift-api 2>/dev/null || true
          aws logs delete-log-group --log-group-name /ecs/waveshift-worker 2>/dev/null || true

      # 1. INFRASTRUTTURA - CloudFormation

      - name: Deploy Network Stack
        run: |
          aws cloudformation deploy \
            --template-file infra/network.yaml \
            --stack-name ${{ env.PROJECT_NAME }}-network-dev \
            --parameter-overrides ProjectName=${{ env.PROJECT_NAME }} \
            --no-fail-on-empty-changeset

      # 2. FRONTEND - Deploy su S3 + CloudFront (prima del backend per avere il dominio)

      - name: Deploy Frontend Stack
        run: |
          aws cloudformation deploy \
            --template-file frontend/frontend.yaml \
            --stack-name ${{ env.PROJECT_NAME }}-frontend-dev \
            --parameter-overrides BucketName=${{ env.PROJECT_NAME }}-frontend-dev \
            --no-fail-on-empty-changeset

      - name: Get CloudFront Domain and Distribution ID
        id: cloudfront
        run: |
          CLOUDFRONT_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-frontend-dev \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomain'].OutputValue" \
            --output text)
          echo "domain=$CLOUDFRONT_DOMAIN" >> $GITHUB_OUTPUT

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-frontend-dev \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      # Cleanup risorse API Gateway non gestite da CloudFormation

      - name: Cleanup unmanaged API Gateway resources
        run: |
          API_ID=$(aws apigateway get-rest-apis \
            --query "items[?name=='waveshift-api'].id" \
            --output text 2>/dev/null || echo "")

          if [ -n "$API_ID" ] && [ "$API_ID" != "None" ]; then
            STACK_RESOURCES=$(aws cloudformation list-stack-resources \
              --stack-name ${{ env.PROJECT_NAME }}-app-dev \
              --query "StackResourceSummaries[?ResourceType=='AWS::ApiGateway::Resource'].PhysicalResourceId" \
              --output text 2>/dev/null || echo "")

            while IFS=$'\t' read -r RES_ID RES_PATH; do
              [ -z "$RES_ID" ] && continue
              if ! echo "$STACK_RESOURCES" | grep -qw "$RES_ID"; then
                case "$RES_PATH" in
                  /health|/jobs/{jobId}/confirm|/cors-test)
                    echo "Eliminazione risorsa non gestita: $RES_PATH ($RES_ID)"
                    aws apigateway delete-resource \
                      --rest-api-id $API_ID \
                      --resource-id $RES_ID 2>/dev/null || true
                    ;;
                esac
              fi
            done <<< "$(aws apigateway get-resources \
              --rest-api-id $API_ID \
              --query "items[?path != '/'].[id,path]" \
              --output text 2>/dev/null || echo "")"
          fi

      - name: Deploy App Stack
        run: |
          aws cloudformation deploy \
            --template-file infra/app.yaml \
            --stack-name ${{ env.PROJECT_NAME }}-app-dev \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides ProjectName=${{ env.PROJECT_NAME }} CloudFrontDomain=${{ steps.cloudfront.outputs.domain }} \
            --no-fail-on-empty-changeset

      - name: Deploy API Gateway resources and stage
        run: |
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-app-dev \
            --query "Stacks[0].Outputs[?OutputKey=='ApiId'].OutputValue" \
            --output text)

          LAMBDA_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-app-dev \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaFunctionName'].OutputValue" \
            --output text | xargs -I{} aws lambda get-function --function-name {} --query "Configuration.FunctionArn" --output text)

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=${{ env.AWS_REGION }}

          ROOT_ID=$(aws apigateway get-resources \
            --rest-api-id $API_ID \
            --query "items[?path=='/'].id" \
            --output text)

          JOBS_ID=$(aws apigateway get-resources \
            --rest-api-id $API_ID \
            --query "items[?path=='/jobs'].id" \
            --output text)

          JOBS_ID_ID=$(aws apigateway get-resources \
            --rest-api-id $API_ID \
            --query "items[?path=='/jobs/{jobId}'].id" \
            --output text)

          # /health
          HEALTH_ID=$(aws apigateway get-resources \
            --rest-api-id $API_ID \
            --query "items[?path=='/health'].id" \
            --output text)
          if [ -z "$HEALTH_ID" ] || [ "$HEALTH_ID" == "None" ]; then
            HEALTH_ID=$(aws apigateway create-resource \
              --rest-api-id $API_ID --parent-id $ROOT_ID --path-part health \
              --query "id" --output text)
            aws apigateway put-method --rest-api-id $API_ID --resource-id $HEALTH_ID \
              --http-method GET --authorization-type NONE
            aws apigateway put-integration --rest-api-id $API_ID --resource-id $HEALTH_ID \
              --http-method GET --type MOCK --request-templates '{"application/json":"{\"statusCode\":200}"}'
            aws apigateway put-method-response --rest-api-id $API_ID --resource-id $HEALTH_ID \
              --http-method GET --status-code 200
            aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $HEALTH_ID \
              --http-method GET --status-code 200
            echo "Risorsa /health creata"
          fi

          # /jobs OPTIONS (CORS)
          OPTIONS_EXISTS=$(aws apigateway get-method --rest-api-id $API_ID \
            --resource-id $JOBS_ID --http-method OPTIONS 2>/dev/null && echo "yes" || echo "no")
          if [ "$OPTIONS_EXISTS" == "no" ]; then
            aws apigateway put-method --rest-api-id $API_ID --resource-id $JOBS_ID \
              --http-method OPTIONS --authorization-type NONE
            aws apigateway put-integration --rest-api-id $API_ID --resource-id $JOBS_ID \
              --http-method OPTIONS --type MOCK --request-templates '{"application/json":"{\"statusCode\":200}"}'
            aws apigateway put-method-response --rest-api-id $API_ID --resource-id $JOBS_ID \
              --http-method OPTIONS --status-code 200 \
              --response-parameters '{"method.response.header.Access-Control-Allow-Headers":false,"method.response.header.Access-Control-Allow-Methods":false,"method.response.header.Access-Control-Allow-Origin":false}'
            aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $JOBS_ID \
              --http-method OPTIONS --status-code 200 \
              --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,Authorization'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'OPTIONS,GET,POST'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}'
            echo "Metodo OPTIONS /jobs creato"
          fi

          # /jobs/{jobId}/confirm
          CONFIRM_ID=$(aws apigateway get-resources \
            --rest-api-id $API_ID \
            --query "items[?path=='/jobs/{jobId}/confirm'].id" \
            --output text)
          if [ -z "$CONFIRM_ID" ] || [ "$CONFIRM_ID" == "None" ]; then
            AUTHORIZER_ID=$(aws apigateway get-authorizers \
              --rest-api-id $API_ID \
              --query "items[0].id" --output text)
            CONFIRM_ID=$(aws apigateway create-resource \
              --rest-api-id $API_ID --parent-id $JOBS_ID_ID --path-part confirm \
              --query "id" --output text)
            aws apigateway put-method --rest-api-id $API_ID --resource-id $CONFIRM_ID \
              --http-method POST --authorization-type COGNITO_USER_POOLS \
              --authorizer-id $AUTHORIZER_ID
            aws apigateway put-integration --rest-api-id $API_ID --resource-id $CONFIRM_ID \
              --http-method POST --type AWS_PROXY --integration-http-method POST \
              --uri "arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations"
            echo "Risorsa /jobs/{jobId}/confirm creata"
          fi

          # DLQ Alarm
          DLQ_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-app-dev \
            --query "Stacks[0].Outputs[?OutputKey=='QueueUrl'].OutputValue" \
            --output text | awk -F'/' '{print $NF}' | sed 's/waveshift-app-dev-JobsDLQ/waveshift-app-dev-JobsDLQ/')
          aws cloudwatch put-metric-alarm \
            --alarm-name "${{ env.PROJECT_NAME }}-dlq-not-empty" \
            --metric-name ApproximateNumberOfMessagesVisible \
            --namespace AWS/SQS \
            --dimensions Name=QueueName,Value=$DLQ_NAME \
            --statistic Sum --period 300 --evaluation-periods 1 \
            --threshold 1 --comparison-operator GreaterThanOrEqualToThreshold 2>/dev/null || true

          # Crea deployment e stage prod
          DEPLOYMENT_ID=$(aws apigateway create-deployment \
            --rest-api-id $API_ID \
            --description "Deploy from ${{ github.sha }}" \
            --query "id" --output text)

          aws apigateway create-stage \
            --rest-api-id $API_ID \
            --stage-name prod \
            --deployment-id $DEPLOYMENT_ID 2>/dev/null || \
          aws apigateway update-stage \
            --rest-api-id $API_ID \
            --stage-name prod \
            --patch-operations op=replace,path=/deploymentId,value=$DEPLOYMENT_ID

          echo "Stage prod aggiornato con deployment $DEPLOYMENT_ID"

      # 3. CONVERTER - Docker build & push su ECR + aggiorna ECS

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          ECR_REPO=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-app-dev \
            --query "Stacks[0].Outputs[?OutputKey=='EcrRepoUri'].OutputValue" \
            --output text)

          docker build -t $ECR_REPO:${{ github.sha }} -t $ECR_REPO:latest converter/
          docker push $ECR_REPO:${{ github.sha }}
          docker push $ECR_REPO:latest

      - name: Update ECS Task Definition with new image
        run: |
          ECR_REPO=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-app-dev \
            --query "Stacks[0].Outputs[?OutputKey=='EcrRepoUri'].OutputValue" \
            --output text)

          CLUSTER_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-app-dev \
            --query "Stacks[0].Outputs[?OutputKey=='EcsClusterName'].OutputValue" \
            --output text)

          SERVICE_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-app-dev \
            --query "Stacks[0].Outputs[?OutputKey=='EcsServiceName'].OutputValue" \
            --output text)

          TASK_FAMILY=$(aws ecs describe-services \
            --cluster $CLUSTER_NAME \
            --services $SERVICE_NAME \
            --query "services[0].taskDefinition" \
            --output text | awk -F'/' '{print $NF}' | cut -d':' -f1)

          aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query 'taskDefinition' | \
            jq --arg IMAGE "$ECR_REPO:${{ github.sha }}" \
              '.containerDefinitions[0].image = $IMAGE |
               del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)' \
            > /tmp/task-def.json

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_NAME \
            --task-definition $NEW_TASK_ARN \
            --force-new-deployment

      # 4. LAMBDA - Package e deploy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Package Lambda function
        run: |
          mkdir -p backend/package
          cp backend/lambda_app.py backend/package/lambda_app.py
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt -t backend/package/ --quiet
          fi
          cd backend/package && zip -r ../lambda_package.zip .

      - name: Deploy Lambda function
        run: |
          LAMBDA_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-app-dev \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaFunctionName'].OutputValue" \
            --output text)

          aws lambda update-function-code \
            --function-name $LAMBDA_NAME \
            --zip-file fileb://backend/lambda_package.zip

          aws lambda wait function-updated \
            --function-name $LAMBDA_NAME

      # 5. SYNC FRONTEND FILES to S3

      - name: Deploy Frontend Files to S3
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-frontend-dev \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)

          aws s3 sync frontend/ s3://$BUCKET_NAME/ \
            --delete \
            --exclude "*.yaml"

      # 6. INVALIDA LA CACHE CLOUDFRONT

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cloudfront.outputs.distribution_id }} \
            --paths "/*"