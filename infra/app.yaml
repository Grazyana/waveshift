AWSTemplateFormatVersion: '2010-09-09'
Description: Application Infrastructure and Serverless Resources

Parameters:
  ProjectName:
    Type: String
    Default: waveshift
  CloudFrontDomain:
    Type: String
    Default: ""

Resources:
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AudioJobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [PUT]
            AllowedOrigins: ['*']

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET]
            AllowedOrigins: ['*']

  JobsDLQ:
    Type: AWS::SQS::Queue

  DLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: waveshift-dlq-not-empty
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Dimensions:
        - Name: QueueName
          Value: !GetAtt JobsDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
    

  JobsQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt JobsDLQ.Arn
        maxReceiveCount: 3

  # AUTH (COGNITO)
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: waveshift-pool
      AutoVerifiedAttributes: [email]

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlows: [code]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes: [email, openid, profile]
      CallbackURLs: 
        - !Sub "https://${CloudFrontDomain}/callback"
      LogoutURLs: 
        - !Sub "https://${CloudFrontDomain}/logout"
      SupportedIdentityProviders: [COGNITO]

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Sub "waveshift-${AWS::AccountId}"

  # BACKEND (LAMBDA + API Gateway)
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt JobsTable.Arn
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt JobsQueue.Arn
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub ${InputBucket.Arn}/*
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub ${OutputBucket.Arn}/*

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.11
      Handler: lambda_app.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Environment:
        Variables:
          JOBS_TABLE: !Ref JobsTable
          INPUT_BUCKET: !Ref InputBucket
          OUTPUT_BUCKET: !Ref OutputBucket
          SQS_QUEUE_URL: !Ref JobsQueue
      Code:
        ZipFile: |
          import json
          import uuid
          import os
          import boto3
          import time

          s3 = boto3.client('s3')
          sqs = boto3.client('sqs')
          dynamodb = boto3.resource('dynamodb')

          JOBS_TABLE = os.environ['JOBS_TABLE']
          INPUT_BUCKET = os.environ['INPUT_BUCKET']
          OUTPUT_BUCKET = os.environ['OUTPUT_BUCKET']
          QUEUE_URL = os.environ['SQS_QUEUE_URL']

          def handler(event, context):
              try:
                  method = event['httpMethod']
                  path = event['resource']
                  claims = event['requestContext']['authorizer']['claims']
                  user_id = claims['sub']

                  if method == 'POST' and path == '/jobs':
                      job_id = str(uuid.uuid4())
                      input_key = f"{user_id}/{job_id}/input.mp3"
                      output_key = f"{user_id}/{job_id}/output.mp3"
                      
                      presigned_url = s3.generate_presigned_url(
                          'put_object',
                          Params={'Bucket': INPUT_BUCKET, 'Key': input_key},
                          ExpiresIn=300
                      )

                      table = dynamodb.Table(JOBS_TABLE)
                      table.put_item(Item={
                          'jobId': job_id,
                          'userId': user_id,
                          'status': 'STARTED',
                          'inputKey': input_key,
                          'outputKey': output_key,
                          'createdAt': str(int(time.time())),
                          'updatedAt': str(int(time.time()))
                      })
                      
                      sqs.send_message(
                          QueueUrl=QUEUE_URL,
                          MessageBody=json.dumps({
                              'jobId': job_id,
                              'userId': user_id,
                              'inputBucket': INPUT_BUCKET,
                              'inputKey': input_key,
                              'outputBucket': OUTPUT_BUCKET,
                              'outputKey': output_key
                          })
                      )
                      
                      return response(200, {'jobId': job_id, 'uploadUrl': presigned_url})

                  elif method == 'GET' and path == '/jobs/{jobId}':
                      job_id = event['pathParameters']['jobId']
                      table = dynamodb.Table(JOBS_TABLE)
                      item = table.get_item(Key={'jobId': job_id}).get('Item')
                      
                      if not item or item['userId'] != user_id:
                          return response(404, {'error': 'Job not found'})
                          
                      return response(200, item)

                  elif method == 'GET' and path == '/jobs/{jobId}/download':
                      job_id = event['pathParameters']['jobId']
                      table = dynamodb.Table(JOBS_TABLE)
                      item = table.get_item(Key={'jobId': job_id}).get('Item')
                      
                      if not item or item['userId'] != user_id:
                          return response(404, {'error': 'Job not found'})
                      
                      if item['status'] != 'SUCCEEDED':
                          return response(400, {'error': 'Job not ready'})
                          
                      download_url = s3.generate_presigned_url(
                          'get_object',
                          Params={'Bucket': OUTPUT_BUCKET, 'Key': item['outputKey']},
                          ExpiresIn=300
                      )
                      
                      return response(200, {'downloadUrl': download_url})

                  return response(400, {'error': 'Invalid request'})

              except Exception as e:
                  print(e)
                  return response(500, {'error': str(e)})

          def response(code, body):
              return {
                  'statusCode': code,
                  'headers': {
                      'Access-Control-Allow-Origin': '*',
                      'Access-Control-Allow-Credentials': True
                  },
                  'body': json.dumps(body)
              }

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LambdaFunction}
      RetentionInDays: 7

  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "API-Gateway-Execution-Logs_${RestApi}/prod"
      RetentionInDays: 7

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: waveshift-api
      #BinaryMediaTypes: ['*/*']

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: CognitoAuthorizer
      Type: COGNITO_USER_POOLS
      RestApiId: !Ref RestApi
      ProviderARNs:
        - !GetAtt UserPool.Arn
      IdentitySource: method.request.header.Authorization

  JobsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: jobs

  JobsIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref JobsResource
      PathPart: '{jobId}'

  DownloadResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref JobsIdResource
      PathPart: download

  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: health

  HealthGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        PassthroughBehavior: WHEN_NO_TEMPLATES
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200

  JobsOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref JobsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        PassthroughBehavior: WHEN_NO_TEMPLATES
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,GET,POST'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true
  
  JobsPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref JobsResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations

  JobsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref JobsIdResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations

  DownloadGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref DownloadResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - JobsPostMethod
      - JobsGetMethod
      - DownloadGetMethod
      - HealthGetMethod
      - JobsOptionsMethod
    Properties:
      RestApiId: !Ref RestApi

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*/*

  # WORKER (ECS + ECR)
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: waveshift-worker

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: waveshift-cluster

  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/waveshift-worker
      RetentionInDays: 7

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WorkerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                Resource: !GetAtt JobsQueue.Arn
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: !GetAtt JobsTable.Arn
              - Effect: Allow
                Action: 
                  - s3:GetObject
                  - s3:HeadObject
                Resource: !Sub ${InputBucket.Arn}/*
              - Effect: Allow
                Action: 
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub ${OutputBucket.Arn}/*

  EcsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: waveshift-worker
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepository}:latest
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: worker
          HealthCheck:
            Command: ["CMD-SHELL", "exit 0"]
            Interval: 30
            Timeout: 5
            Retries: 3
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: SQS_QUEUE_URL
              Value: !Ref JobsQueue
            - Name: JOBS_TABLE
              Value: !Ref JobsTable

  EcsService:
    Type: AWS::ECS::Service
    DependsOn: [EcsTaskDefinition]
    Properties:
      Cluster: !Ref EcsCluster
      ServiceName: waveshift-service
      TaskDefinition: !Ref EcsTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - Fn::ImportValue: waveshift-network-dev-PublicSubnet1
            - Fn::ImportValue: waveshift-network-dev-PublicSubnet2
          SecurityGroups:
            - Fn::ImportValue: waveshift-network-dev-EcsSecurityGroup

Outputs:
  ApiBaseUrl:
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  CognitoDomain:
    Value: !Ref UserPoolDomain
  CognitoClientId:
    Value: !Ref UserPoolClient
  InputBucket:
    Value: !Ref InputBucket
  OutputBucket:
    Value: !Ref OutputBucket
  JobsTable:
    Value: !Ref JobsTable
  QueueUrl:
    Value: !Ref JobsQueue
  EcrRepoUri:
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepository}
  EcsClusterName:
    Value: !Ref EcsCluster
  EcsServiceName:
    Value: waveshift-service
  LambdaFunctionName:
    Value: !Ref LambdaFunction