    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: waveshift-cluster

  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/waveshift-worker
      RetentionInDays: 7

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WorkerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                Resource: !GetAtt JobsQueue.Arn
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: !GetAtt JobsTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:HeadObject
                Resource: !Sub ${InputBucket.Arn}/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub ${OutputBucket.Arn}/*

  EcsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: waveshift-worker
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepository}:latest
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: worker
          HealthCheck:
            Command: ["CMD-SHELL", "exit 0"]
            Interval: 30
            Timeout: 5
            Retries: 3
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: SQS_QUEUE_URL
              Value: !Ref JobsQueue
            - Name: JOBS_TABLE
              Value: !Ref JobsTable

  EcsService:
    Type: AWS::ECS::Service
    DependsOn: [EcsTaskDefinition]
    Properties:
      Cluster: !Ref EcsCluster
      ServiceName: waveshift-service
      TaskDefinition: !Ref EcsTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - Fn::ImportValue: !Sub "${ProjectName}-network-dev-PublicSubnet1"
            - Fn::ImportValue: !Sub "${ProjectName}-network-dev-PublicSubnet2"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${ProjectName}-network-dev-EcsSecurityGroup"

  # -------------------------------------------------------
  # AUTO SCALING: scala i container in base alla coda SQS
  # -------------------------------------------------------
  EcsScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: EcsService
    Properties:
      MinCapacity: 1
      MaxCapacity: 5
      ResourceId: !Sub service/${EcsCluster}/waveshift-service
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ScaleUpPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: waveshift-scale-up
      PolicyType: StepScaling
      ScalingTargetId: !Ref EcsScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: 60
        StepAdjustments:
          - MetricIntervalLowerBound: 0
            ScalingAdjustment: 1

  ScaleDownPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: waveshift-scale-down
      PolicyType: StepScaling
      ScalingTargetId: !Ref EcsScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: 120
        StepAdjustments:
          - MetricIntervalUpperBound: 0
            ScalingAdjustment: -1

  # Allarme: messaggi in coda → scala su
  QueueDepthAlarmHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: waveshift-queue-high
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Dimensions:
        - Name: QueueName
          Value: !GetAtt JobsQueue.QueueName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref ScaleUpPolicy

  # Allarme: coda vuota → scala giù
  QueueDepthAlarmLow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: waveshift-queue-low
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Dimensions:
        - Name: QueueName
          Value: !GetAtt JobsQueue.QueueName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleDownPolicy

Outputs:
  ApiBaseUrl:
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  CognitoDomain:
    Value: !Ref UserPoolDomain
  CognitoClientId:
    Value: !Ref UserPoolClient
  InputBucket:
    Value: !Ref InputBucket
  OutputBucket:
    Value: !Ref OutputBucket
  JobsTable:
    Value: !Ref JobsTable
  QueueUrl:
    Value: !Ref JobsQueue
  EcrRepoUri:
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepository}
  EcsClusterName:
    Value: !Ref EcsCluster
  EcsServiceName:
    Value: waveshift-service
  LambdaFunctionName:
    Value: !Ref LambdaFunction
  ApiId:
    Value: !Ref RestApi
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: waveshift-worker
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepository}:latest
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: worker
          HealthCheck:
            Command: ["CMD-SHELL", "exit 0"]
            Interval: 30
            Timeout: 5
            Retries: 3
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: SQS_QUEUE_URL
              Value: !Ref JobsQueue
            - Name: JOBS_TABLE
              Value: !Ref JobsTable

  EcsService:
    Type: AWS::ECS::Service
    DependsOn: [EcsTaskDefinition]
    Properties:
      Cluster: !Ref EcsCluster
      ServiceName: waveshift-service
      TaskDefinition: !Ref EcsTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - Fn::ImportValue: !Sub "${ProjectName}-network-dev-PublicSubnet1"
            - Fn::ImportValue: !Sub "${ProjectName}-network-dev-PublicSubnet2"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${ProjectName}-network-dev-EcsSecurityGroup"

